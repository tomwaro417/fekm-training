<!DOCTYPE html>
<html>
<head>
    <title>Test Upload Vidéo</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input[type="file"] { width: 100%; padding: 10px; margin-bottom: 10px; }
        button { background: #fbbf24; color: #000; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #f59e0b; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; padding: 15px; border-radius: 8px; }
        .success { background: #d1fae5; color: #065f46; }
        .error { background: #fee2e2; color: #991b1b; }
        .loading { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body>
    <h1>🎬 Test Upload Vidéo</h1>
    <p>Page de test pour uploader des vidéos</p>
    
    <div class="form-group">
        <label>Technique ID:</label>
        <input type="text" id="techniqueId" placeholder="ID de la technique" style="width: 100%; padding: 10px;">
    </div>
    
    <div class="form-group">
        <label>Type de vidéo:</label>
        <select id="videoType">
            <option value="COACH">Vidéo du Coach</option>
            <option value="DEMONSTRATION">Démonstration</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Fichier vidéo:</label>
        <input type="file" id="videoFile" accept="video/*">
    </div>
    
    <div class="form-group">
        <label>Ou utiliser la caméra:</label>
        <input type="file" id="cameraFile" accept="video/*" capture="environment">
    </div>
    
    <button onclick="uploadVideo()" id="uploadBtn">Uploader la vidéo</button>
    
    <div id="status"></div>

    <script>
        async function uploadVideo() {
            const techniqueId = document.getElementById('techniqueId').value;
            const type = document.getElementById('videoType').value;
            const fileInput = document.getElementById('videoFile');
            const cameraInput = document.getElementById('cameraFile');
            const status = document.getElementById('status');
            const btn = document.getElementById('uploadBtn');
            
            const file = fileInput.files[0] || cameraInput.files[0];
            
            if (!techniqueId || !file) {
                status.className = 'error';
                status.textContent = 'Veuillez remplir tous les champs';
                return;
            }
            
            btn.disabled = true;
            status.className = 'loading';
            status.textContent = 'Upload en cours...';
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('techniqueId', techniqueId);
            formData.append('type', type);
            
            try {
                const response = await fetch('/api/admin/videos/upload', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    status.className = 'success';
                    status.textContent = '✅ Vidéo uploadée avec succès !';
                    fileInput.value = '';
                    cameraInput.value = '';
                } else {
                    status.className = 'error';
                    status.textContent = '❌ Erreur: ' + (result.error || 'Upload échoué');
                }
            } catch (error) {
                status.className = 'error';
                status.textContent = '❌ Erreur réseau: ' + error.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
